[build]
builder = "nixpacks"

[deploy]
startCommand = "php spark serve --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
APP_ENV = "production"
CI_ENVIRONMENT = "production"
