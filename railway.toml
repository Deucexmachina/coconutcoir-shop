[build]
builder = "NIXPACKS"
buildCommand = "composer install --optimize-autoloader --no-dev --no-scripts --no-interaction --ignore-platform-req=ext-intl"

[deploy]
startCommand = "php -S 0.0.0.0:$PORT -t public"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10